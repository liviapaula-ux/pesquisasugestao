        function render() {
            const container = document.getElementById('content');
            const categories = [...new Set(questionsData.map(item => item.cat))];
            container.innerHTML = '';

            categories.forEach(cat => {
                const catQuestions = questionsData.filter(q => q.cat === cat);
                
                const section = document.createElement('section');
                section.className = 'category-section bg-white p-6 md:p-8 rounded-r-xl shadow-sm border border-slate-100 mb-8';
                section.dataset.categoryName = cat.toLowerCase();

                let questionsHtml = catQuestions.map(q => `
                    <div class="question-block py-5 border-b border-slate-50 last:border-0 group">
                        <div class="flex gap-4">
                            <span class="text-slate-300 font-mono text-xs mt-1 min-w-[30px]">#${String(q.id).padStart(2, '0')}</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <p class="text-slate-800 font-semibold leading-tight">${q.q}</p>
                                    <span class="text-[10px] text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded uppercase font-bold">${q.sub}</span>
                                </div>
                                <p class="options-line">${q.options}</p>
                            </div>
                        </div>
                    </div>
                `).join('');

                section.innerHTML = `
                    <h2 class="text-[#ea1d2c] font-bold text-xs uppercase tracking-widest mb-6 flex items-center gap-2">
                        <span class="w-2.5 h-2.5 bg-[#ea1d2c] rounded-full"></span>
                        ${cat}
                    </h2>
                    <div class="space-y-1">
                        ${questionsHtml}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function filterContent() {
            const input = document.getElementById('filterInput').value.toLowerCase();
            const blocks = document.querySelectorAll('.question-block');
            const sections = document.querySelectorAll('.category-section');
            let hasAnyVisible = false;

            blocks.forEach(block => {
                const text = block.innerText.toLowerCase();
                if (text.includes(input)) {
                    block.style.display = 'block';
                    hasAnyVisible = true;
                } else {
                    block.style.display = 'none';
                }
            });

            sections.forEach(section => {
                const visibleBlocks = section.querySelectorAll('.question-block[style="display: block;"]');
                section.style.display = (visibleBlocks.length > 0 || input === "") ? 'block' : 'none';
            });

            document.getElementById('emptyState').classList.toggle('hidden', hasAnyVisible || input === "");
        }

        window.onload = render;
